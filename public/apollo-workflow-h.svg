<svg xmlns="http://www.w3.org/2000/svg" width="1606" height="572" viewBox="12 60 1606 572" role="img" aria-label="Apollo workflow: upload logo and product, choose method and style, pick shots and generate, then approve client-ready images."><rect x="40" y="140" width="360" height="360" rx="22" fill="#ffffff" stroke="#d4d4d8" stroke-width="1.5"/><text font-family="ui-monospace,'Cascadia Code','Consolas',monospace" font-size="20" fill="#6366f1" text-anchor="start"><tspan x="68" y="187">01</tspan></text><text font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="25" fill="#18181b" text-anchor="start"><tspan x="68" y="226">Upload logo &amp; product</tspan></text><text font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="17" fill="#71717a" text-anchor="start"><tspan x="68" y="261">Your logo plus a clear photo of</tspan><tspan x="68" y="284">the blank product it goes on.</tspan></text><rect x="68" y="310" width="304" height="70" rx="22" fill="#f4f4f5" stroke="#e4e4e7" stroke-width="1"/><rect x="84" y="327" width="36" height="36" rx="9" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/><text font-family="ui-monospace,'Cascadia Code','Consolas',monospace" font-size="18" fill="#18181b" text-anchor="start"><tspan x="132" y="337">logo.svg</tspan></text><text font-family="ui-monospace,'Cascadia Code','Consolas',monospace" font-size="13" fill="#a1a1aa" text-anchor="start"><tspan x="132" y="361">PNG · SVG · transparent</tspan></text><rect x="68" y="395" width="304" height="70" rx="22" fill="#f4f4f5" stroke="#e4e4e7" stroke-width="1"/><rect x="84" y="412" width="36" height="36" rx="9" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/><text font-family="ui-monospace,'Cascadia Code','Consolas',monospace" font-size="18" fill="#18181b" text-anchor="start"><tspan x="132" y="422">product.jpg</tspan></text><text font-family="ui-monospace,'Cascadia Code','Consolas',monospace" font-size="13" fill="#a1a1aa" text-anchor="start"><tspan x="132" y="446">the blank item</tspan></text><polyline points="400,320 480,320" fill="none" stroke="#a1a1aa" stroke-width="2" stroke-linecap="round" /><rect x="480" y="140" width="360" height="360" rx="22" fill="#ffffff" stroke="#d4d4d8" stroke-width="1.5"/><text font-family="ui-monospace,'Cascadia Code','Consolas',monospace" font-size="20" fill="#6366f1" text-anchor="start"><tspan x="508" y="187">02</tspan></text><text font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="25" fill="#18181b" text-anchor="start"><tspan x="508" y="226">Choose method &amp; style</tspan></text><text font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="17" fill="#71717a" text-anchor="start"><tspan x="508" y="261">Embroidered or screen print,</tspan><tspan x="508" y="284">plus placement &amp; size.</tspan></text><rect x="508" y="320" width="150" height="46" rx="22" fill="#4f46e5" stroke="#4f46e5" stroke-width="1"/><text font-family="ui-monospace,'Cascadia Code','Consolas',monospace" font-size="16" fill="#ffffff" text-anchor="middle"><tspan x="583" y="348">Embroidered</tspan></text><rect x="668" y="320" width="140" height="46" rx="22" fill="#ffffff" stroke="#d4d4d8" stroke-width="1"/><text font-family="ui-monospace,'Cascadia Code','Consolas',monospace" font-size="16" fill="#71717a" text-anchor="middle"><tspan x="738" y="348">Screen print</tspan></text><text font-family="ui-monospace,'Cascadia Code','Consolas',monospace" font-size="14" fill="#a1a1aa" text-anchor="start"><tspan x="508" y="408">+ drag a placement marker</tspan></text><polyline points="840,320 920,320" fill="none" stroke="#a1a1aa" stroke-width="2" stroke-linecap="round" /><rect x="920" y="140" width="360" height="360" rx="22" fill="#ffffff" stroke="#d4d4d8" stroke-width="1.5"/><text font-family="ui-monospace,'Cascadia Code','Consolas',monospace" font-size="20" fill="#6366f1" text-anchor="start"><tspan x="948" y="187">03</tspan></text><text font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="25" fill="#18181b" text-anchor="start"><tspan x="948" y="226">Pick shots &amp; generate</tspan></text><text font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="17" fill="#71717a" text-anchor="start"><tspan x="948" y="261">Select only the shots you</tspan><tspan x="948" y="284">need, then generate.</tspan></text><ellipse cx="957" cy="331" rx="9" ry="9" fill="#059669" stroke="#059669" stroke-width="1"/><text font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="17" fill="#18181b" text-anchor="start"><tspan x="978" y="336">Product shot</tspan></text><ellipse cx="957" cy="373" rx="9" ry="9" fill="#059669" stroke="#059669" stroke-width="1"/><text font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="17" fill="#18181b" text-anchor="start"><tspan x="978" y="378">Stitch close-up</tspan></text><ellipse cx="957" cy="415" rx="9" ry="9" fill="#059669" stroke="#059669" stroke-width="1"/><text font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="17" fill="#18181b" text-anchor="start"><tspan x="978" y="420">On-model photo</tspan></text><text font-family="ui-monospace,'Cascadia Code','Consolas',monospace" font-size="14" fill="#a1a1aa" text-anchor="start"><tspan x="1350" y="100">APOLLO GENERATES</tspan></text><polyline points="1280,320 1342,170" fill="none" stroke="#c7d2fe" stroke-width="2" stroke-linecap="round" /><polyline points="1280,320 1342,320" fill="none" stroke="#c7d2fe" stroke-width="2" stroke-linecap="round" /><polyline points="1280,320 1342,470" fill="none" stroke="#c7d2fe" stroke-width="2" stroke-linecap="round" /><rect x="1350" y="118" width="240" height="104" rx="22" fill="#fafafa" stroke="#d4d4d8" stroke-width="1.5"/><rect x="1458" y="138" width="24" height="24" rx="6" fill="#eef2ff" stroke="#4f46e5" stroke-width="1"/><text font-family="ui-monospace,'Cascadia Code','Consolas',monospace" font-size="15" fill="#52525b" text-anchor="middle